<html>
    <head>
        <title>Lab 2 - Coffee Order Form</title>
    </head>
    <body>
        <h1>Coffee Order Form</h1>
        <p>Order Coffee Here!</p>

        <form action="https://www.w3schools.com/action_page.php" method="get">
            <!--Customer Name-->
            <label for="customerName">Name:</label> <br>
            <input type="text" id="customerName" name="customerName">
            <br><br>

            <!--Customer Email-->
            <label for="customerEmail">Email Address:</label> <br>
            <input type="email" id="customerEmail" name="customerEmail">
            <br><br>

            <!--Spooky Scary Coffee Types-->
            <label for="coffeeType">Coffee Type:</label> <br>
            <select id="coffeeType" name="coffeeType">
                <option value="latte">Latte</option>
                <option value="cappuccino">Cappuccino</option>
                <option value="espresso">Espresso</option>
            </select>
            <br><br>

            <!--Coffee Sizes-->
            <!--I wonder if Starbucks will sue me-->
            <label>Size:</label><br>
            <input type="radio" name="size" value="shortie">Short / Small <br>
            <input type="radio" name="size" value="tall">Tall / Medium <br>
            <input type="radio" name="size" value="grande">Grande / Large <br>
            <input type="radio" name="size" value="venti">Venti / XLarge
            <br><br>

            <!--Extras!!!!!!!!!!-->
            <label>Extras:</label><br>
            <input type="checkbox" name="extras" value="whippedCream">Whipped Cream <br>
            <input type="checkbox" name="extras" value="extraShot">Extra Shot <br>
            <input type="checkbox" name="extras" value="almondMilk">Almond Milk
            <br><br>
    
            <label for="instructions">Special Instructions:</label> <br>
            <textarea id="instructions" name="instructions" rows="4" cols="40"></textarea>
            <br><br>
    
            <input type="submit" value="Submit Order">
        </form>
    </body>
</html>
